networks:
  infra:
    name: infra
    driver: bridge

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: usov
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FORGEJO_DB_PASSWORD: ${FORGEJO_DB_PASSWORD:-}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usov -d usov"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - infra
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: postgres:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:-${POSTGRES_PASSWORD}}
      FORGEJO__session__PROVIDER: redis
      FORGEJO__session__PROVIDER_CONFIG: network=tcp,addr=redis:6379,db=0
      FORGEJO__server__SSH_LISTEN_PORT: "222"
      FORGEJO__server__SSH_PORT: "222"
    volumes:
      - ./data/forgejo:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:222"
    networks:
      - infra
