name: pantheora-run02-opencode

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RUN02_POSTGRES_DB:-paperclip_run02}
      POSTGRES_USER: ${RUN02_POSTGRES_USER:-paperclip}
      POSTGRES_PASSWORD: ${RUN02_POSTGRES_PASSWORD:-paperclip}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${RUN02_POSTGRES_USER:-paperclip} -d ${RUN02_POSTGRES_DB:-paperclip_run02}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./data/run02/postgres:/var/lib/postgresql/data

  paperclip:
    build:
      context: .
      dockerfile: ./config/run02/paperclip-opencode/Dockerfile
      args:
        PAPERCLIP_IMAGE: ${PAPERCLIP_IMAGE:-ghcr.io/paperclipai/paperclip:latest}
    image: pantheora/paperclip-opencode-run02:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${RUN02_PAPERCLIP_PORT:-3200}:3100"
      - "${RUN02_OPENCODE_WEB_PORT:-4096}:4096"
      - "${RUN02_OPENCODE_OAUTH_CALLBACK_PORT:-1455}:1455"
    environment:
      DATABASE_URL: postgres://${RUN02_POSTGRES_USER:-paperclip}:${RUN02_POSTGRES_PASSWORD:-paperclip}@postgres:5432/${RUN02_POSTGRES_DB:-paperclip_run02}
      HOST: 0.0.0.0
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      XDG_CONFIG_HOME: /home/node/.config
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}
      PAPERCLIP_PUBLIC_URL: ${RUN02_PAPERCLIP_PUBLIC_URL:-http://localhost:3200}
      PAPERCLIP_ALLOWED_HOSTNAMES: ${RUN02_PAPERCLIP_ALLOWED_HOSTNAMES:-localhost,127.0.0.1,host.docker.internal}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HOME: /home/node
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3100/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - ./data/run02/paperclip:/paperclip
      - ./data/run02/opencode-config:/home/node/.config/opencode
      - ./data/run02/claude-home:/home/node/.claude
      - ./:/workspace/pantheora
